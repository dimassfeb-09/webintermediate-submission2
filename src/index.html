<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story App</title>

    <!-- Tambahkan base path agar semua relative path mengacu ke subfolder GitHub Pages -->
    <base href="/webintermediate-submission2/" />

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Manifest dan Theme -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#4CAF50" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  </head>
  <body>
    <a href="#main-content" class="skip-to-content">Lewati ke Konten</a>
    <header>
      <h1>Story App</h1>
      <nav>
        <a href="#/" id="nav-home">HOME</a>
        <a href="#/add-story" id="nav-add">TAMBAH CERITA</a>
        <button id="subscribeBtn">Aktifkan Notifikasi</button>
        <a href="#/login" id="nav-login">LOGIN</a>
        <a href="#/register" id="nav-register">REGISTER</a>
        <a href="#" id="nav-logout" style="display: none">LOGOUT</a>
      </nav>
    </header>

    <main id="main-content">
      <div id="storyContainer"></div>
    </main>

    <!-- Penting: Jangan daftarkan service worker dari root, pakai relative path -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered', reg))
          .catch(err => console.error('SW registration failed', err));
      }
    </script>

    <!-- Jangan langsung load dari src/, harus dari hasil bundling Webpack -->
    <script type="module" src="bundle.js"></script>
  </body>
</html>
